var fbAuth=firebase.auth(),fbDb=firebase.firestore(),fbStorage=firebase.storage(),fbGoogleProvider=new firebase.auth.GoogleAuthProvider();
// Firestore CRUD
function fsLoad(c){return fbDb.collection(c).get().then(function(s){return s.docs.map(function(d){var o=d.data();o._docId=d.id;return o})}).catch(function(){return[]})}
function fsSave(c,id,d){return fbDb.collection(c).doc(id).set(d,{merge:true}).catch(function(e){console.error(e)})}
function fsDelete(c,id){return fbDb.collection(c).doc(id).delete().catch(function(e){console.error(e)})}
function fsAdd(c,d){return fbDb.collection(c).add(d).then(function(r){return r.id}).catch(function(){return null})}
// Bunny.net Upload
var bunnyConfig=null;
function getBunnyConfig(){
if(bunnyConfig)return Promise.resolve(bunnyConfig);
return fbDb.collection("config").doc("bunny").get().then(function(d){
if(d.exists){bunnyConfig=d.data();return bunnyConfig}
return null;
}).catch(function(){return null});
}
function bunnyUpload(file,folder){
return getBunnyConfig().then(function(cfg){
if(!cfg||!cfg.storagePassword||!cfg.storageZone)throw new Error("Bunny config eksik");
var fileName=Date.now()+"_"+file.name.replace(/[^a-zA-Z0-9._-]/g,"_");
var path=folder+"/"+fileName;
var endpoint="https://storage.bunnycdn.com/"+cfg.storageZone+"/"+path;
return fetch(endpoint,{
method:"PUT",
headers:{"AccessKey":cfg.storagePassword,"Content-Type":"application/octet-stream"},
body:file
}).then(function(r){
if(!r.ok)throw new Error("Upload failed: "+r.status);
var cdnBase=cfg.cdnUrl||("https://"+cfg.storageZone+".b-cdn.net");
return cdnBase+"/"+path;
});
});
}
// fbUploadImage - Bunny wrapper
function fbUploadImage(file,path){return bunnyUpload(file,path.split("/")[0]||"etkinlikler")}
// Brevo Mail
var BREVO_URL="https://script.google.com/macros/s/AKfycbwUNvVhTCvxUKOMtbFJ4_UASBo8-sgT13qT_9tWeYKZR3IYaYKUhGdSaGgGaaqMaZLf/exec";

method:"POST",

}).then(function(res){console.log("📧 Mail response:",res.type,res.status)}).catch(function(e){console.error("📧 Mail HATA:",e)});
}

/* ═══ IMAGE UPLOADER ═══ */
function ImageUploader({images,setImages}){
const[uploading,setUploading]=useState(false);
const fileRef=useRef();
const handleFiles=async(e)=>{
const files=Array.from(e.target.files);if(!files.length)return;
setUploading(true);
for(const file of files){
if(file.size>5*1024*1024){alert(file.name+" 5MB üzeri!");continue}
const path="etkinlikler/"+Date.now()+"_"+file.name;
const url=await fbUploadImage(file,path);
if(url)setImages(prev=>[...prev,url]);
}
setUploading(false);if(fileRef.current)fileRef.current.value="";
};
const remove=(i)=>setImages(images.filter((_,j)=>j!==i));
return(<div style={{background:"#f9fcf9",borderRadius:10,padding:14,border:"1px solid #dce8dc"}}>
<label style={{display:"block",fontSize:12,fontWeight:700,color:"#2e5339",marginBottom:4,fontFamily:"'Nunito',sans-serif"}}>📸 Görseller</label>
<p style={{fontFamily:"'Nunito',sans-serif",fontSize:10,color:"#888",margin:"2px 0 8px"}}>Kart: 600×400px | Detay: 1200×800px | Max 5MB</p>
<button onClick={()=>fileRef.current?.click()} disabled={uploading} style={{padding:"8px 16px",background:"linear-gradient(135deg,#2e5339,#4a7c59)",color:"#fff",border:"none",borderRadius:10,fontFamily:"'Nunito',sans-serif",fontWeight:700,fontSize:12,cursor:"pointer",opacity:uploading?0.6:1}}>
{uploading?"⏳ Yükleniyor...":"📁 Bilgisayardan Seç"}
</button>
<input ref={fileRef} type="file" accept="image/*" multiple style={{display:"none"}} onChange={handleFiles}/>
{images.length>0&&<div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:10}}>
{images.map((img,i)=>(<div key={i} style={{position:"relative",width:90,height:65,borderRadius:8,overflow:"hidden",border:"2px solid #dce8dc"}}>
<img src={img} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
<button onClick={()=>remove(i)} style={{position:"absolute",top:2,right:2,width:18,height:18,borderRadius:"50%",background:"#e53935",color:"#fff",border:"none",fontSize:10,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
{i===0&&<div style={{position:"absolute",bottom:0,left:0,right:0,background:"rgba(46,83,57,0.8)",color:"#fff",fontSize:8,textAlign:"center",padding:1}}>KAPAK</div>}
</div>))}
</div>}
</div>)}

function AuthBar({user,onLogin,onLogout,onProfile}){
return(<div style={{background:"rgba(0,0,0,0.15)",padding:"6px 20px",display:"flex",justifyContent:"flex-end",alignItems:"center",gap:10}}>
{user?(<>
<img src={user.photoURL||LOGO} alt="" style={{width:24,height:24,borderRadius:"50%"}}/>
<span style={{fontFamily:"'Nunito',sans-serif",fontSize:12,color:"rgba(255,255,255,0.9)",fontWeight:600}}>{user.displayName||user.email}</span>
<button onClick={onProfile} style={{background:"rgba(255,255,255,0.2)",border:"none",borderRadius:6,padding:"3px 10px",color:"#fff",fontSize:11,cursor:"pointer",fontFamily:"'Nunito',sans-serif",fontWeight:700}}>👤 Profilim</button>
<button onClick={onLogout} style={{background:"rgba(255,255,255,0.1)",border:"none",borderRadius:6,padding:"3px 10px",color:"rgba(255,255,255,0.7)",fontSize:11,cursor:"pointer",fontFamily:"'Nunito',sans-serif",fontWeight:600}}>Çıkış</button>
</>):(<>
<span style={{fontFamily:"'Nunito',sans-serif",fontSize:11,color:"rgba(255,255,255,0.6)"}}>Kayıt için giriş yapın</span>
<button onClick={onLogin} style={{background:"#fff",border:"none",borderRadius:6,padding:"4px 12px",color:"#2e5339",fontSize:12,cursor:"pointer",fontFamily:"'Nunito',sans-serif",fontWeight:700}}>Google ile Giriş</button>
</>)}
</div>)}

/* ═══ PROFILE PAGE ═══ */

const rmChild=(i)=>f("children",fm.children.filter((_,j)=>j!==i));
const save=async()=>{
const data={...fm,updatedAt:new Date().toISOString()};
if(fm.kvkkConsent&&!profile?.kvkkDate)data.kvkkDate=new Date().toISOString();
await fsSave("etkinlik_profiller",user.email,data);
setProfile(data);setSaved(true);setTimeout(()=>setSaved(false),2000);
};

/* ═══ COUNTDOWN ═══ */
function useCountdown(td){const[t,setT]=useState({});useEffect(()=>{const c=()=>{const d=new Date(td).getTime()-Date.now();return d<=0?{expired:true}:{days:Math.floor(d/864e5),hours:Math.floor((d/36e5)%24),minutes:Math.floor((d/6e4)%60),seconds:Math.floor((d/1e3)%60),expired:false}};setT(c());const i=setInterval(()=>setT(c()),1000);return()=>clearInterval(i)},[td]);return t}
function Countdown({date}){const t=useCountdown(date);if(t.expired)return<span style={{color:"#c62828",fontWeight:600,fontSize:12,fontFamily:ff}}>Sona erdi</span>;return(<div style={{display:"flex",gap:4}}>{[{v:t.days,l:"Gün"},{v:t.hours,l:"Saat"},{v:t.minutes,l:"Dk"},{v:t.seconds,l:"Sn"}].map((u,i)=>(<div key={i} style={{background:`linear-gradient(135deg,${G},${GL})`,color:"#fff",borderRadius:6,padding:"3px 6px",textAlign:"center",minWidth:36,fontFamily:"'DM Mono', monospace"}}><div style={{fontSize:14,fontWeight:700,lineHeight:1.2}}>{String(u.v||0).padStart(2,"0")}</div><div style={{fontSize:8,opacity:0.85,letterSpacing:0.5}}>{u.l}</div></div>))}</div>)}

function Dash({events,regs}){
const pub=events.filter(e=>e.status==="published").length;
// 🆕 totalAttendees üzerinden çocuk sayısı yerine toplam katılımcı hesabı eklendi
const tc=regs.reduce((s,r)=>s+r.children.length,0);
const tk=regs.reduce((s,r)=>{
  if(typeof r.totalAttendees==="number")return s+r.totalAttendees;
  const yet=parseInt(r.parent?.attendeeCount)||1;
  return s+yet+(r.children?.length||0);
},0);
const src={};regs.forEach(r=>{const s=r.extra?.heardFrom||"?";src[s]=(src[s]||0)+1});
const ts=Object.entries(src).sort((a,b)=>b[1]-a[1]);
const stats=[{l:"Toplam Etkinlik",v:events.length,i:"📅",c:"#1565c0"},{l:"Yayında",v:pub,i:"✅",c:"#2e7d32"},{l:"Toplam Kayıt",v:regs.length,i:"📝",c:"#e65100"},{l:"Toplam Katılımcı",v:tk,i:"👥",c:"#c2185b"}];

return(<div><h2 style={{fontFamily:ffT,color:"#1b3a26",margin:"0 0 20px",fontSize:24}}>📊 Gösterge Paneli</h2><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:14,marginBottom:24}}>{stats.map((s,i)=>(<div key={i} style={{...crd,display:"flex",alignItems:"center",gap:14,marginBottom:0}}><div style={{width:44,height:44,borderRadius:12,background:s.c+"15",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>{s.i}</div><div><div style={{fontSize:22,fontWeight:800,color:"#1b3a26",fontFamily:ff}}>{s.v}</div><div style={{fontSize:11,color:"#888",fontWeight:600,fontFamily:ff}}>{s.l}</div></div></div>))}</div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}><div style={crd}><h3 style={{fontFamily:ff,fontWeight:800,color:G,fontSize:14,margin:"0 0 12px"}}>📈 Doluluk (Toplam Katılımcı)</h3>{events.map(ev=>{
const evRegs=regs.filter(r=>r.eventId===ev.id);
const c=evRegs.reduce((sum,r)=>{
  if(typeof r.totalAttendees==="number")return sum+r.totalAttendees;
  const yet=parseInt(r.parent?.attendeeCount)||1;
  return sum+yet+(r.children?.length||0);
},0);
const pc=ev.capacity>0?Math.round((c/ev.capacity)*100):0;
return(<div key={ev.id} style={{marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",fontSize:12,fontFamily:ff,color:"#555",marginBottom:3}}><span style={{fontWeight:700}}>{ev.title}</span><span>{c}/{ev.capacity}</span></div><div style={{height:8,background:"#e8f0e8",borderRadius:4,overflow:"hidden"}}><div style={{height:"100%",borderRadius:4,background:pc>=100?"#dc2626":pc>80?"#e65100":`linear-gradient(90deg,${GL},#6ba368)`,width:`${Math.min(pc,100)}%`}}/></div></div>)})}</div>
<div style={crd}><h3 style={{fontFamily:ff,fontWeight:800,color:G,fontSize:14,margin:"0 0 12px"}}>📣 Kaynak</h3>{ts.map(([s,c],i)=>(<div key={i} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid #f0f0f0",fontFamily:ff,fontSize:13}}><span style={{color:"#555"}}>{s}</span><span style={{fontWeight:800,color:G}}>{c}</span></div>))}</div></div></div>)}

const[fm,setFm]=useState(event||emptyEv());
const f=(k,v)=>setFm({...fm,[k]:v});

{/* 🆕 Audience rozeti */}
<span style={{background:aud==="public"?"#fef3c7":"#e8f5e9",color:aud==="public"?"#78350f":"#2e5339",padding:"2px 8px",borderRadius:10,fontSize:10,fontWeight:700,fontFamily:ff}}>{aud==="public"?"🌍 Herkese":"🌷 Bir Çiçek"}</span>
<span style={{background:st?.bg,color:st?.color,padding:"2px 8px",borderRadius:10,fontSize:10,fontWeight:700,fontFamily:ff}}>{st?.label}</span>{!ev.isFree&&<span style={{background:"#fff3e0",color:"#e65100",padding:"2px 8px",borderRadius:10,fontSize:10,fontWeight:700,fontFamily:ff}}>₺{ev.fee}</span>}</div><div style={{fontFamily:ff,fontSize:11,color:"#888"}}>{fmtDate(ev.date)} • {ev.startTime}–{ev.endTime}</div></div><div style={{display:"flex",gap:6,flexShrink:0}}><button onClick={()=>setEd(ev)} style={{padding:"6px 12px",background:"#e8f5e9",border:"none",borderRadius:8,color:G,fontFamily:ff,fontWeight:700,fontSize:11,cursor:"pointer"}}>✏️</button><button onClick={()=>del(ev.id)} style={{padding:"6px 12px",background:"#ffebee",border:"none",borderRadius:8,color:"#c62828",fontFamily:ff,fontWeight:700,fontSize:11,cursor:"pointer"}}>🗑️</button></div></div>)})}</div>)}

const csv=()=>{const h="Tarih,Etkinlik,Ad,Soyad,Telefon,E-posta,İlçe,Veli Tipi,Katılımcı,Çocuk Sayısı,Bir Çiçek Referans,Kaynak,Ödeme\n";const rows=fil.map(r=>{const en=events.find(e=>e.id===r.eventId)?.title||"";const veliTip=r.isBirCicekFamily===true?"Bir Çiçek Ailesi":r.isBirCicekFamily===false?"Dışarıdan":"-";const ref=r.bircicekReferans?`${r.bircicekReferans.veliAdi||""} ${r.bircicekReferans.veliTelefon||""}`.trim():"";const kati=typeof r.totalAttendees==="number"?r.totalAttendees:(parseInt(r.parent?.attendeeCount)||1)+(r.children?.length||0);return`"${new Date(r.timestamp).toLocaleDateString("tr-TR")}","${en}","${r.parent.name}","${r.parent.surname}","${r.parent.phone}","${r.parent.email}","${r.parent.district}","${veliTip}","${kati}","${r.children.length}","${ref}","${r.extra.heardFrom}","${r.paymentMethod||"Ücretsiz"}"`}).join("\n");const b=new Blob(["\uFEFF"+h+rows],{type:"text/csv;charset=utf-8;"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="kayit_raporu.csv";a.click()};

<div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontFamily:ff,fontSize:12}}><thead><tr style={{background:G,color:"#fff"}}>{["Tarih","Etkinlik","Ad Soyad","Tip","Katılımcı","Telefon","E-posta","Kaynak","Ödeme"].map(h=><th key={h} style={{padding:"8px 10px",textAlign:"left",fontWeight:700,fontSize:11,whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead><tbody>{fil.map((r,i)=>{

function SubsPage({events}){
const[subs,setSubs]=useState([]);const[loading,setLoading]=useState(true);const[sending,setSending]=useState(false);const[sent,setSent]=useState("");const[selEvent,setSelEvent]=useState("");
useEffect(()=>{fsLoad("etkinlik_aboneler").then(s=>{setSubs(s.filter(x=>x.active!==false));setLoading(false)})},[]);

brevoMail(sub.email,sub.name||"",ev.title+" — Yeni Etkinlik | Bir Çiçek Koleji",html,"eposta@bircicekkoleji.com");

await new Promise(r=>setTimeout(r,300));
}

};

return(<div>

</select>

</div>
<div style={{display:"flex",justifyContent:"flex-end",marginBottom:10}}><button onClick={csv} style={{...btnP,fontSize:11,padding:"6px 14px"}}>📥 CSV</button></div>

</tr>))}</tbody>
</table></div>}
{!loading&&!subs.length&&<div style={{textAlign:"center",padding:30,color:"#999",fontFamily:ff}}>Henüz abone yok.</div>}
</div>)}

function SettingsPage({settings,setSettings}){const[fm,setFm]=useState({...settings});const[saved,setSaved]=useState(false);const f=(k,v)=>{setFm({...fm,[k]:v});setSaved(false)};const save=async()=>{setSettings({...fm});await fsSave("etkinlik_ayarlar","main",fm);setSaved(true);setTimeout(()=>setSaved(false),2000)};
return(<div><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}><h2 style={{fontFamily:ffT,color:"#1b3a26",margin:0,fontSize:24}}>⚙️ Ayarlar</h2><div style={{display:"flex",gap:8}}>{saved&&<span style={{fontFamily:ff,fontSize:13,color:"#2e7d32",fontWeight:700,alignSelf:"center"}}>✅ Kaydedildi!</span>}<button onClick={save} style={{...btnP,fontSize:13}}>💾 Kaydet</button></div></div>
<div style={{display:"grid",gap:16}}>
<div style={crd}><h3 style={{fontFamily:ff,fontWeight:800,color:G,fontSize:14,margin:"0 0 14px"}}>🏷️ Hero Bölümü</h3><div style={{display:"grid",gap:12}}><div><label style={lbl}>Rozet Yazısı</label><input style={inp(false)} value={fm.badge} onChange={e=>f("badge",e.target.value)}/></div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}><div><label style={lbl}>Başlık 1</label><input style={inp(false)} value={fm.titleLine1} onChange={e=>f("titleLine1",e.target.value)}/></div><div><label style={lbl}>Başlık 2</label><input style={inp(false)} value={fm.titleLine2} onChange={e=>f("titleLine2",e.target.value)}/></div></div><div><label style={lbl}>Alt Yazı</label><textarea style={{...inp(false),minHeight:50,resize:"vertical"}} value={fm.subtitle} onChange={e=>f("subtitle",e.target.value)}/></div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}><div><label style={lbl}>Özellik 1</label><input style={inp(false)} value={fm.feat1} onChange={e=>f("feat1",e.target.value)}/></div><div><label style={lbl}>Özellik 2</label><input style={inp(false)} value={fm.feat2} onChange={e=>f("feat2",e.target.value)}/></div><div><label style={lbl}>Özellik 3</label><input style={inp(false)} value={fm.feat3} onChange={e=>f("feat3",e.target.value)}/></div></div></div></div>
<div style={crd}><h3 style={{fontFamily:ff,fontWeight:800,color:G,fontSize:14,margin:"0 0 14px"}}>🏦 IBAN / Ödeme Bilgileri</h3><div style={{display:"grid",gap:12}}><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}><div><label style={lbl}>Banka Adı</label><input style={inp(false)} value={fm.ibanBank} onChange={e=>f("ibanBank",e.target.value)}/></div><div><label style={lbl}>Hesap Sahibi</label><input style={inp(false)} value={fm.ibanHolder} onChange={e=>f("ibanHolder",e.target.value)}/></div></div><div><label style={lbl}>IBAN Numarası</label><input style={inp(false)} value={fm.ibanNumber} onChange={e=>f("ibanNumber",e.target.value)} placeholder="TR00 0000 0000 0000 0000 0000 00"/></div></div></div>
<div style={crd}><h3 style={{fontFamily:ff,fontWeight:800,color:G,fontSize:14,margin:"0 0 14px"}}>📞 Footer & İletişim</h3><div style={{display:"grid",gap:12}}><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}><div><label style={lbl}>Footer Başlık</label><input style={inp(false)} value={fm.footerTitle} onChange={e=>f("footerTitle",e.target.value)}/></div><div><label style={lbl}>Footer Alt Yazı</label><input style={inp(false)} value={fm.footerSubtitle} onChange={e=>f("footerSubtitle",e.target.value)}/></div></div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}><div><label style={lbl}>Telefon 1</label><input style={inp(false)} value={fm.phone1} onChange={e=>f("phone1",e.target.value)}/></div><div><label style={lbl}>Telefon 2</label><input style={inp(false)} value={fm.phone2} onChange={e=>f("phone2",e.target.value)}/></div><div><label style={lbl}>E-posta</label><input style={inp(false)} value={fm.email} onChange={e=>f("email",e.target.value)}/></div></div></div></div>
</div></div>)}
/* ═══ 🆕 MAIN APP ═══ */
function App(){
const[fbUser,setFbUser]=useState(null);
const[loading,setLoading]=useState(true);
const[view,setView]=useState(typeof window!=="undefined"&&new URLSearchParams(window.location.search).get("admin")==="true"?"admin":"public");
const[ap,setAp]=useState("dash");
const[events,setEvents]=useState([]);
const[regs,setRegs]=useState([]);
const[profile,setProfile]=useState(null);
const[showProfile,setShowProfile]=useState(false);
const[settings,setSettings]=useState(DEFAULT_SETTINGS);
const[regEv,setRegEv]=useState(null);
const[detEv,setDetEv]=useState(null);
const[filter,setFilter]=useState("all");
const[audienceFilter,setAudienceFilter]=useState("all"); // 🆕
const[loginRequired,setLoginRequired]=useState(null); // 🆕
const[footerClicks,setFooterClicks]=useState(0);
const[isVeli,setIsVeli]=useState(false);

// Firebase Auth listener
useEffect(()=>{const u=fbAuth.onAuthStateChanged(u=>{setFbUser(u)});return()=>u()},[]);

// Veriyi yükle
useEffect(()=>{async function load(){try{
const[e,r]=await Promise.all([fsLoad("etkinlikler"),fsLoad("etkinlik_kayitlari")]);
setEvents(e);setRegs(r);
const s=await fbDb.collection("etkinlik_ayarlar").doc("main").get();
if(s.exists)setSettings({...DEFAULT_SETTINGS,...s.data()})
}catch(e){console.error(e)}setLoading(false)}load()},[]);

// Profil yükle
useEffect(()=>{if(!fbUser)return;async function lp(){try{const d=await fbDb.collection("etkinlik_profiller").doc(fbUser.email).get();if(d.exists)setProfile(d.data())}catch(e){}}lp()},[fbUser]);

// Veli mi kontrolü
useEffect(()=>{
if(!fbUser){setIsVeli(false);return}
fbDb.collection("veliler").doc(fbUser.email).get()
  .then(d=>{setIsVeli(d.exists&&d.data()?.onaylandi===true)})
  .catch(()=>setIsVeli(false))
},[fbUser]);

const googleLogin=async()=>{
try{await fbAuth.signInWithPopup(fbGoogleProvider)}
catch(e){
console.log("Auth error:",e.code,e.message);
if(e.code==="auth/popup-blocked"||e.code==="auth/cancelled-popup-request"||e.code==="auth/popup-closed-by-user"){
try{await fbAuth.signInWithRedirect(fbGoogleProvider)}
catch(e2){console.error("Redirect error:",e2)}
}else if(e.code==="auth/unauthorized-domain"){
alert("Bu domain Firebase'de yetkili değil. Firebase Console > Authentication > Settings > Authorized domains'e ekleyin: "+window.location.hostname)
}
}
};
const googleLogout=()=>fbAuth.signOut();

// 🆕 Yeni kayıt - filledSpots da güncelle
const handleNewReg=async(reg)=>{
const id=await fsAdd("etkinlik_kayitlari",reg);
if(id)setRegs(p=>[...p,{...reg,_docId:id}]);

// 🆕 Etkinliğin filledSpots'unu güncelle
const ev=events.find(e=>e.id===reg.eventId);
if(ev&&ev._docId){
  const yeniFilledSpots=(ev.filledSpots||0)+(reg.totalAttendees||1);
  await fsSave("etkinlikler",ev._docId,{filledSpots:yeniFilledSpots});
  setEvents(prev=>prev.map(e=>e.id===reg.eventId?{...e,filledSpots:yeniFilledSpots}:e));
}

// Profil otomatik güncelle
if(fbUser&&reg.parent){
const pData={
  name:reg.parent.name,surname:reg.parent.surname,phone:reg.parent.phone,email:reg.parent.email,
  address:reg.parent.address,district:reg.parent.district,
  emergencyName:reg.extra?.emergencyName||"",emergencyPhone:reg.extra?.emergencyPhone||"",
  allergies:reg.extra?.allergies||"",children:reg.children||[],
  updatedAt:new Date().toISOString()
};
if(!profile){pData.kvkkConsent=true;pData.kvkkDate=new Date().toISOString();pData.photoConsent=true}
await fsSave("etkinlik_profiller",fbUser.email,{...profile,...pData});
setProfile(p=>({...p,...pData}))
}
};

// 🆕 Kayıt başlatma fonksiyonu - Login + audience kontrolü
const handleRegStart=(ev)=>{
// Login kontrolü
if(!fbUser){
setLoginRequired(ev);
return;
}
// Bir Çiçekli özel etkinliğine dışarıdan birinin uyarısı
const audience=ev.audience||"bircicekli";
if(audience==="bircicekli"&&!isVeli){
if(!confirm(`"${ev.title}" etkinliği sadece Bir Çiçek Koleji ailelerine özeldir.\n\nÇocuğunuz şu an okulumuzda kayıtlı değilse, kayıt isteğiniz okul tarafından değerlendirilecektir.\n\nDevam etmek istiyor musunuz?`))return;
}
setRegEv(ev);
};

const pubEvs=events.filter(e=>e.status==="published");
// 🆕 Audience + type filtreleri birleştir
let filEvs=pubEvs;
if(filter!=="all")filEvs=filEvs.filter(e=>e.type===filter);
if(audienceFilter!=="all")filEvs=filEvs.filter(e=>(e.audience||"bircicekli")===audienceFilter);

const S=settings;
const isAdmin=fbUser&&fbUser.email===ADMIN_EMAIL;

const handleFooterClick=()=>{
const c=footerClicks+1;
setFooterClicks(c);
if(c>=5){
setFooterClicks(0);
if(isAdmin){setView("admin")}
else if(fbUser){alert("Bu hesapta admin yetkisi yok.")}
else{googleLogin()}
}
setTimeout(()=>setFooterClicks(0),3000);
};

if(loading)return(<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#f4f7f2"}}><div style={{textAlign:"center"}}><div className="spinner"/><p style={{fontFamily:ff,color:"#888",fontSize:13,marginTop:12}}>Yükleniyor...</p></div></div>);

// 🆕 Admin moduna girerken: önce giriş, sonra yetki kontrolü
if(view==="admin"&&!fbUser)return(<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#f4f7f2",padding:20}}><div style={{background:"#fff",borderRadius:20,padding:"36px 28px",maxWidth:420,width:"100%",textAlign:"center",boxShadow:"0 20px 60px rgba(0,0,0,0.1)"}}><div style={{width:64,height:64,margin:"0 auto 14px",background:`linear-gradient(135deg,${G},${GL})`,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:32}}>🔐</div><h2 style={{fontFamily:ffT,color:G,margin:"0 0 8px",fontSize:20}}>Admin Girişi Gerekli</h2><p style={{fontFamily:ff,color:"#666",fontSize:13,lineHeight:1.6,margin:"0 0 20px"}}>Etkinlik Yönetim Modülüne erişmek için Google hesabınızla giriş yapınız.</p><button onClick={googleLogin} style={{...btnP,width:"100%",padding:"12px 24px",marginBottom:8}}>Google ile Giriş Yap</button><button onClick={()=>{setView("public");window.history.replaceState({},"",window.location.pathname)}} style={{...btnS,width:"100%",borderColor:"#ccc",color:"#666"}}>Anasayfaya Dön</button></div></div>);
if(view==="admin"&&fbUser&&!isAdmin)return(<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#f4f7f2",padding:20}}><div style={{background:"#fff",borderRadius:20,padding:"36px 28px",maxWidth:420,width:"100%",textAlign:"center",boxShadow:"0 20px 60px rgba(0,0,0,0.1)"}}><div style={{width:64,height:64,margin:"0 auto 14px",background:"#fef3c7",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:32}}>⚠️</div><h2 style={{fontFamily:ffT,color:"#92400e",margin:"0 0 8px",fontSize:20}}>Erişim Yetkiniz Yok</h2><p style={{fontFamily:ff,color:"#666",fontSize:13,lineHeight:1.6,margin:"0 0 6px"}}>Giriş yapılan hesap: <strong>{fbUser.email}</strong></p><p style={{fontFamily:ff,color:"#666",fontSize:13,lineHeight:1.6,margin:"0 0 20px"}}>Admin paneli sadece <strong>{ADMIN_EMAIL}</strong> hesabıyla erişilebilir.</p><button onClick={()=>{setView("public");window.history.replaceState({},"",window.location.pathname)}} style={{...btnP,width:"100%",padding:"12px 24px",marginBottom:8}}>Anasayfaya Dön</button><button onClick={googleLogout} style={{...btnS,width:"100%",borderColor:"#ccc",color:"#666"}}>Çıkış Yap (Farklı Hesapla Gir)</button></div></div>);

if(view==="public")return(
<div style={{minHeight:"100vh",background:"#f4f7f2",fontFamily:ff}}>

<div style={{background:`linear-gradient(160deg,#1b3a26 0%,${G} 40%,${GL} 100%)`,position:"relative",overflow:"hidden"}}>
<AuthBar user={fbUser} onLogin={googleLogin} onLogout={googleLogout} onProfile={()=>setShowProfile(true)}/>
<div style={{padding:"32px 20px 28px",textAlign:"center",position:"relative"}}>
<div style={{position:"absolute",inset:0,opacity:0.05,backgroundImage:`url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23fff'%3E%3Ccircle cx='30' cy='30' r='2'/%3E%3C/g%3E%3C/svg%3E")`}}/>
<div style={{position:"relative",zIndex:1}}>
<img src={LOGO} alt="Bir Çiçek Koleji" style={{width:64,height:64,borderRadius:"50%",border:"3px solid rgba(255,255,255,0.3)",display:"block",margin:"0 auto 12px",boxShadow:"0 4px 16px rgba(0,0,0,0.2)"}}/>
<div style={{display:"inline-block",background:"rgba(255,255,255,0.15)",padding:"5px 16px",borderRadius:20,color:"#b9e4c9",fontSize:11,fontWeight:700,letterSpacing:2,marginBottom:14,textTransform:"uppercase"}}>{S.badge}</div>
<h1 style={{fontFamily:ffT,color:"#fff",fontSize:"clamp(26px,5vw,40px)",margin:"0 0 8px",fontWeight:800,lineHeight:1.2}}>{S.titleLine1}<br/>{S.titleLine2}</h1>
<p style={{color:"rgba(255,255,255,0.8)",fontSize:14,maxWidth:500,margin:"0 auto 16px",lineHeight:1.6}}>{S.subtitle}</p>
<div style={{display:"flex",justifyContent:"center",gap:14,flexWrap:"wrap",fontSize:12,fontWeight:700,color:"rgba(255,255,255,0.7)"}}><span>{S.feat1}</span><span>{S.feat2}</span><span>{S.feat3}</span></div>
</div>
</div>
</div>

{/* 🆕 ÇİFT FİLTRE BARI */}
<div style={{maxWidth:960,margin:"0 auto",padding:"20px 16px 0"}}>
{/* Tür filtreleri */}
<div style={{display:"flex",gap:6,flexWrap:"wrap",justifyContent:"center",marginBottom:10}}>
{[{k:"all",l:"Tümü"},...Object.entries(TL).map(([k,v])=>({k,l:`${v.icon} ${v.label}`}))].map(f=>(<button key={f.k} onClick={()=>setFilter(f.k)} style={{padding:"7px 16px",background:filter===f.k?G:"#fff",color:filter===f.k?"#fff":"#555",border:filter===f.k?"none":"1px solid #ddd",borderRadius:18,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:ff}}>{f.l}</button>))}
</div>
{/* 🆕 Audience filtreleri */}
<div style={{display:"flex",gap:6,flexWrap:"wrap",justifyContent:"center"}}>
{[
{k:"all",l:"🌐 Tüm Etkinlikler",bg:"#37474f"},
{k:"public",l:"🌍 Okul Dışından Katılıma Açık",bg:"#f59e0b"},
{k:"bircicekli",l:"🌷 Bir Çiçekli Ebeveynlere Özel",bg:"#2e5339"}
].map(f=>(<button key={f.k} onClick={()=>setAudienceFilter(f.k)} style={{padding:"6px 14px",background:audienceFilter===f.k?f.bg:"#fff",color:audienceFilter===f.k?"#fff":"#555",border:audienceFilter===f.k?"none":"1px solid #ddd",borderRadius:18,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:ff}}>{f.l}</button>))}
</div>
</div>

<div style={{maxWidth:960,margin:"0 auto",padding:"20px 16px 40px",display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(270px,1fr))",gap:20}}>
{filEvs.map(ev=><PubCard key={ev.id} ev={ev} regs={regs} onReg={handleRegStart} onDet={setDetEv} isVeli={isVeli}/>)}
{!filEvs.length&&<div style={{gridColumn:"1/-1",textAlign:"center",padding:40,color:"#999"}}>Bu kategoride etkinlik yok.</div>}
</div>

{/* ABONE OL BANDI */}
<div style={{background:"linear-gradient(135deg, #1b5e20, #2e7d32)",padding:"28px 20px",textAlign:"center"}}>
<h2 style={{fontFamily:ffT,color:"#fff",margin:"0 0 6px",fontSize:20}}>📬 Etkinliklerden Haberdar Olun</h2>
<p style={{color:"rgba(255,255,255,0.8)",fontSize:13,margin:"0 auto 16px",maxWidth:420}}>Yeni etkinlikler eklendiğinde size e-posta ile bildirim gönderelim.</p>
<SubscribeForm/>
</div>

{/* Veli Bilgilendirme */}
{fbUser&&isVeli&&<div style={{maxWidth:960,margin:"0 auto",padding:"0 16px"}}><div style={{background:"#e8f5e9",border:"1px solid #a5d6a7",borderRadius:12,padding:"12px 18px",marginTop:-8,marginBottom:8,display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:20}}>🌷</span><div><span style={{fontFamily:ff,fontWeight:800,color:"#2e5339",fontSize:13}}>Bir Çiçek Koleji Velisi</span><span style={{fontFamily:ff,color:"#555",fontSize:12,marginLeft:8}}>Etkinliklerde öncelikli kayıt hakkınız bulunmaktadır.</span></div></div></div>}

{/* FOOTER */}
<div style={{background:`linear-gradient(135deg,${G},#1a2e21)`,padding:"28px 20px",textAlign:"center"}}>
<h2 style={{fontFamily:ffT,color:"#fff",margin:"0 0 6px",fontSize:20}}>{S.footerTitle}</h2>
<p style={{color:"rgba(255,255,255,0.7)",fontSize:13,margin:"0 auto 12px",maxWidth:460}}>{S.footerSubtitle}</p>
<div style={{display:"flex",justifyContent:"center",gap:14,flexWrap:"wrap",fontSize:12,color:"rgba(255,255,255,0.6)",marginBottom:16}}><span>{S.phone1}</span><span>{S.phone2}</span><span>{S.email}</span></div>
<div style={{borderTop:"1px solid rgba(255,255,255,0.1)",paddingTop:12}}>
<img src={LOGO} alt="" onClick={handleFooterClick} style={{width:28,height:28,borderRadius:"50%",opacity:0.3,cursor:"default",marginBottom:4,transition:"opacity 0.2s"}}/>
<div style={{fontSize:10,color:"rgba(255,255,255,0.25)",fontFamily:ff}}>© 2026 Bir Çiçek Koleji Anaokulu</div>
</div>
</div>

{/* MODALS */}
{regEv&&<RegModal event={regEv} onClose={()=>setRegEv(null)} onSubmit={handleNewReg} settings={settings} user={fbUser} profile={profile} isVeli={isVeli}/>}
{detEv&&<DetModal ev={detEv} regs={regs} onClose={()=>setDetEv(null)} onReg={handleRegStart}/>}
{showProfile&&fbUser&&<ProfilePage user={fbUser} profile={profile} setProfile={setProfile} events={events} regs={regs} onClose={()=>setShowProfile(false)}/>}
{/* 🆕 LOGIN GEREKLI MODAL */}
{loginRequired&&<LoginRequiredModal event={loginRequired} onClose={()=>setLoginRequired(null)} onLogin={async()=>{const ev=loginRequired;setLoginRequired(null);await googleLogin();setTimeout(()=>{setRegEv(ev)},800);}}/>}

</div>);

// ADMIN VIEW
return(<div style={{display:"flex",minHeight:"100vh",fontFamily:ff}}>
<Sidebar active={ap} setActive={setAp} onOut={()=>setView("public")}/>
<div style={{flex:1,background:"#f4f7f2",padding:"24px 28px",overflowY:"auto"}}>
{ap==="dash"&&<Dash events={events} regs={regs}/>}
{ap==="events"&&<EvMgr events={events} setEvents={setEvents}/>}
{ap==="regs"&&<RegReport events={events} regs={regs}/>}
{ap==="kids"&&<KidReport events={events} regs={regs}/>}
{ap==="subs"&&<SubsPage events={events}/>}
{ap==="settings"&&<SettingsPage settings={settings} setSettings={setSettings}/>}
</div>
</div>)}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
