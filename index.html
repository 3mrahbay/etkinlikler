/* ═══ EMAIL ═══ */
function sendRegistrationEmails(event, reg, settings){
  if(typeof emailjs==="undefined"){console.log("EmailJS not loaded - skipping emails");return}
  // Kullanıcıya giden mail
  try{
    emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_USER, {
      to_email: reg.parent.email,
      to_name: reg.parent.name + " " + reg.parent.surname,
      event_title: event.title,
      event_date: fmtDate(event.date),
      event_time: event.startTime + " - " + event.endTime,
      event_location: event.location,
      map_url: event.mapUrl || "",
      child_name: reg.children.map(c=>c.name).join(", "),
      is_paid: !event.isFree ? "Evet" : "Hayır",
      fee: event.isFree ? "Ücretsiz" : event.fee + " TL",
      payment_method: reg.paymentMethod === "iban" ? "Havale / EFT" : reg.paymentMethod === "event" ? "Etkinlik Günü" : "",
      iban_info: !event.isFree && reg.paymentMethod === "iban" ? `${settings.ibanBank} - ${settings.ibanHolder} - ${settings.ibanNumber}` : "",
      school_phone: "0216 393 54 57",
      parent_phone: reg.parent.phone,
      parent_district: reg.parent.district,
      children_info: reg.children.map(c=>`${c.name} ${c.surname} (${c.gender==="kiz"?"Kız":"Erkek"}, DT: ${c.birthDate})`).join(" | "),
      heard_from: reg.extra.heardFrom,
      allergies: reg.extra.allergies || "Yok",
      notes: reg.extra.notes || "Yok",
      timestamp: new Date().toLocaleString("tr-TR"),
    }, EMAILJS_PUBLIC_KEY);
  }catch(e){console.log("Email error:",e)}
}

/* ═══ COUNTDOWN ═══ */
function useCountdown(td){const[t,setT]=useState({});useEffect(()=>{const c=()=>{const d=new Date(td).getTime()-Date.now();return d<=0?{expired:true}:{days:Math.floor(d/864e5),hours:Math.floor((d/36e5)%24),minutes:Math.floor((d/6e4)%60),seconds:Math.floor((d/1e3)%60),expired:false}};setT(c());const i=setInterval(()=>setT(c()),1000);return()=>clearInterval(i)},[td]);return t}
function Countdown({date}){const t=useCountdown(date);if(t.expired)return<span style={{color:"#c62828",fontWeight:600,fontSize:12,fontFamily:ff}}>Sona erdi</span>;return(<div style={{display:"flex",gap:4}}>{[{v:t.days,l:"Gün"},{v:t.hours,l:"Saat"},{v:t.minutes,l:"Dk"},{v:t.seconds,l:"Sn"}].map((u,i)=>(<div key={i} style={{background:`linear-gradient(135deg,${G},${GL})`,color:"#fff",borderRadius:6,padding:"3px 6px",textAlign:"center",minWidth:36,fontFamily:"'DM Mono', monospace"}}><div style={{fontSize:14,fontWeight:700,lineHeight:1.2}}>{String(u.v||0).padStart(2,"0")}</div><div style={{fontSize:8,opacity:0.85,letterSpacing:0.5}}>{u.l}</div></div>))}</div>)}

      </div>
    </div>
  </div>)}

  const val=()=>{const e={};
    if(step===1){["name","surname","phone","email","address","district"].forEach(f=>{if(!p[f]?.trim())e["p"+f]=true});if(p.email&&!p.email.includes("@"))e.pemail=true}
    if(step===2){if(!ch[0].name.trim())e.c0n=true;if(!ch[0].birthDate)e.c0b=true;if(!ch[0].gender)e.c0g=true}
    if(step===3){if(!ex.heardFrom)e.hd=true;if(!ex.emergencyName.trim())e.en=true;if(!ex.emergencyPhone.trim())e.ep=true}
    const consentStep=event.isFree?4:5;

    if(step===consentStep){if(!co.photo)e.ph=true;if(!co.kvkk)e.kv=true}
    setErr(e);return!Object.keys(e).length};

  const updCh=(i,f,v)=>{const c=[...ch];c[i]={...c[i],[f]:v};setCh(c)};

  const submit=()=>{if(!val())return;
    const reg={id:genId("reg-"),eventId:event.id,timestamp:new Date().toISOString(),paymentMethod:payMethod,parent:p,children:ch,extra:ex};
    onSubmit(reg);

dius:10,color:G,fontFamily:ff,fontWeight:700,fontSize:12,cursor:"pointer"}}>+ Kardeş Ekle</button>}</div>}

return(<div style={crd}><h3 style={{fontFamily:ffT,color:G,margin:"0 0 16px",fontSize:18}}>{event?"✏️ Düzenle":"➕ Yeni Etkinlik"}</h3><div style={{display:"grid",gap:14}}>

<div style={{display:"flex",gap:10,justifyContent:"flex-end"}}><button onClick={onCancel} style={btnS}>İptal</button><button onClick={save} style={btnP}>{event?"💾 Güncelle":"🌿 Oluştur"}</button></div></div></div>)}

function EvMgr({events,setEvents}){const[ed,setEd]=useState(null);const save=(ev)=>{if(ed==="new")setEvents([...events,ev]);else setEvents(events.map(e=>e.id===ev.id?ev:e));setEd(null)};const del=(id)=>{if(confirm("Silmek istediğinize emin misiniz?"))setEvents(events.filter(e=>e.id!==id))};

{events.map(ev=>{const tp=TL[ev.type]||TL.gezi;const st=SM[ev.status];return(<div key={ev.id} style={{...crd,display:"flex",alignItems:"center",gap:14}}><img src={ev.images?.[0]||"https://via.placeholder.com/70"} alt="" style={{width:60,height:60,borderRadius:10,objectFit:"cover",flexShrink:0}}/><div style={{flex:1,minWidth:0}}><div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4,flexWrap:"wrap"}}><span style={{fontFamily:ffT,fontWeight:800,fontSize:14,color:"#1b3a26"}}>{ev.title}</span><span style={{background:tp.bg,color:tp.color,padding:"2px 8px",borderRadius:10,fontSize:10,fontWeight:700,fontFamily:ff}}>{tp.label}</span><span style={{background:st?.bg,color:st?.color,padding:"2px 8px",borderRadius:10,fontSize:10,fontWeight:700,fontFamily:ff}}>{st?.label}</span>{!ev.isFree&&<span style={{background:"#fff3e0",color:"#e65100",padding:"2px 8px",borderRadius:10,fontSize:10,fontWeight:700,fontFamily:ff}}>₺{ev.fee}</span>}</div><div style={{fontFamily:ff,fontSize:11,color:"#888"}}>{fmtDate(ev.date)} • {ev.startTime}–{ev.endTime}</div></div><div style={{display:"flex",gap:6,flexShrink:0}}><button onClick={()=>setEd(ev)} style={{padding:"6px 12px",background:"#e8f5e9",border:"none",borderRadius:8,color:G,fontFamily:ff,fontWeight:700,fontSize:11,cursor:"pointer"}}>✏️</button><button onClick={()=>del(ev.id)} style={{padding:"6px 12px",background:"#ffebee",border:"none",borderRadius:8,color:"#c62828",fontFamily:ff,fontWeight:700,fontSize:11,cursor:"pointer"}}>🗑️</button></div></div>)})}</div>)}

function RegReport({events,regs}){const[fe,setFe]=useState("all");const fil=regs.filter(r=>fe==="all"||r.eventId===fe);
const csv=()=>{const h="Tarih,Etkinlik,Ad,Soyad,Telefon,E-posta,İlçe,Çocuk,Kaynak,Ödeme\n";const rows=fil.map(r=>{const en=events.find(e=>e.id===r.eventId)?.title||"";return`"${new Date(r.timestamp).toLocaleDateString("tr-TR")}","${en}","${r.parent.name}","${r.parent.surname}","${r.parent.phone}","${r.parent.email}","${r.parent.district}","${r.children.length}","${r.extra.heardFrom}","${r.paymentMethod||"Ücretsiz"}"`}).join("\n");const b=new Blob(["\uFEFF"+h+rows],{type:"text/csv;charset=utf-8;"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="kayit_raporu.csv";a.click()};
return(<div><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}}><h2 style={{fontFamily:ffT,color:"#1b3a26",margin:0,fontSize:24}}>👥 Kayıtlar</h2><button onClick={csv} style={{...btnP,fontSize:12}}>📥 CSV</button></div>
<div style={{marginBottom:16}}><select style={{...inp(false),width:"auto",minWidth:200,appearance:"auto"}} value={fe} onChange={e=>setFe(e.target.value)}><option value="all">Tüm Etkinlikler ({regs.length})</option>{events.map(ev=><option key={ev.id} value={ev.id}>{ev.title} ({regs.filter(r=>r.eventId===ev.id).length})</option>)}</select></div>
<div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontFamily:ff,fontSize:12}}><thead><tr style={{background:G,color:"#fff"}}>{["Tarih","Etkinlik","Ad Soyad","Telefon","E-posta","İlçe","Çocuk","Kaynak","Ödeme"].map(h=><th key={h} style={{padding:"8px 10px",textAlign:"left",fontWeight:700,fontSize:11,whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead><tbody>{fil.map((r,i)=>{const en=events.find(e=>e.id===r.eventId)?.title||"—";return(<tr key={r.id} style={{background:i%2?"#f9fcf9":"#fff",borderBottom:"1px solid #e8f0e8"}}><td style={{padding:"8px 10px",whiteSpace:"nowrap"}}>{new Date(r.timestamp).toLocaleDateString("tr-TR")}</td><td style={{padding:"8px 10px",fontWeight:700,color:G,maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{en}</td><td style={{padding:"8px 10px",fontWeight:700}}>{r.parent.name} {r.parent.surname}</td><td style={{padding:"8px 10px"}}>{r.parent.phone}</td><td style={{padding:"8px 10px"}}>{r.parent.email}</td><td style={{padding:"8px 10px"}}>{r.parent.district}</td><td style={{padding:"8px 10px",textAlign:"center"}}>{r.children.length}</td><td style={{padding:"8px 10px"}}>{r.extra.heardFrom}</td><td style={{padding:"8px 10px"}}><span style={{background:r.paymentMethod==="iban"?"#e3f2fd":r.paymentMethod==="event"?"#fff3e0":"#e8f5e9",color:r.paymentMethod==="iban"?"#1565c0":r.paymentMethod==="event"?"#e65100":"#2e7d32",padding:"2px 8px",borderRadius:8,fontSize:10,fontWeight:700}}>{r.paymentMethod==="iban"?"Havale":r.paymentMethod==="event"?"Etkinlikte":"Ücretsiz"}</span></td></tr>)})}</tbody></table></div></div>)}

function KidReport({events,regs}){const all=[];regs.forEach(r=>{const en=events.find(e=>e.id===r.eventId)?.title||"";r.children.forEach(c=>{const age=c.birthDate?Math.floor((Date.now()-new Date(c.birthDate).getTime())/31557600000):"—";all.push({...c,pN:r.parent.name+" "+r.parent.surname,pP:r.parent.phone,evN:en,age})})});
const csv=()=>{const h="Etkinlik,Ad,Soyad,Yaş,Cinsiyet,Okul,Özel Durum,Ebeveyn,Telefon\n";const rows=all.map(c=>`"${c.evN}","${c.name}","${c.surname}","${c.age}","${c.gender==="kiz"?"Kız":"Erkek"}","${c.currentSchool}","${c.specialNeeds}","${c.pN}","${c.pP}"`).join("\n");const b=new Blob(["\uFEFF"+h+rows],{type:"text/csv;charset=utf-8;"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="cocuk_raporu.csv";a.click()};
return(<div><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><h2 style={{fontFamily:ffT,color:"#1b3a26",margin:0,fontSize:24}}>👶 Çocuklar</h2><button onClick={csv} style={{...btnP,fontSize:12}}>📥 CSV</button></div>
<div style={{...crd,padding:"10px 14px",marginBottom:16,display:"flex",gap:20}}><span style={{fontFamily:ff,fontSize:13}}>Toplam: <strong style={{color:G}}>{all.length}</strong></span><span style={{fontFamily:ff,fontSize:13}}>Kız: <strong>{all.filter(c=>c.gender==="kiz").length}</strong></span><span style={{fontFamily:ff,fontSize:13}}>Erkek: <strong>{all.filter(c=>c.gender==="erkek").length}</strong></span></div>
<div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontFamily:ff,fontSize:12}}><thead><tr style={{background:G,color:"#fff"}}>{["Etkinlik","Çocuk","Yaş","Cinsiyet","Okul","Özel","Ebeveyn","Tel"].map(h=><th key={h} style={{padding:"8px 10px",textAlign:"left",fontWeight:700,fontSize:11}}>{h}</th>)}</tr></thead><tbody>{all.map((c,i)=>(<tr key={i} style={{background:i%2?"#f9fcf9":"#fff",borderBottom:"1px solid #e8f0e8"}}><td style={{padding:"8px 10px",fontWeight:700,color:G,maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.evN}</td><td style={{padding:"8px 10px",fontWeight:700}}>{c.name} {c.surname}</td><td style={{padding:"8px 10px",textAlign:"center"}}>{c.age}</td><td style={{padding:"8px 10px"}}>{c.gender==="kiz"?"👧":"👦"}</td><td style={{padding:"8px 10px"}}>{c.currentSchool||"—"}</td><td style={{padding:"8px 10px",color:c.specialNeeds?"#e65100":"#ccc"}}>{c.specialNeeds||"—"}</td><td style={{padding:"8px 10px"}}>{c.pN}</td><td style={{padding:"8px 10px"}}>{c.pP}</td></tr>))}</tbody></table></div></div>)}

function SettingsPage({settings,setSettings}){const[fm,setFm]=useState({...settings});const[saved,setSaved]=useState(false);const f=(k,v)=>{setFm({...fm,[k]:v});setSaved(false)};const save=()=>{setSettings({...fm});setSaved(true);setTimeout(()=>setSaved(false),2000)};
return(<div><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}><h2 style={{fontFamily:ffT,color:"#1b3a26",margin:0,fontSize:24}}>⚙️ Ayarlar</h2><div style={{display:"flex",gap:8}}>{saved&&<span style={{fontFamily:ff,fontSize:13,color:"#2e7d32",fontWeight:700,alignSelf:"center"}}>✅ Kaydedildi!</span>}<button onClick={save} style={{...btnP,fontSize:13}}>💾 Kaydet</button></div></div>
<div style={{display:"grid",gap:16}}>
<div style={crd}><h3 style={{fontFamily:ff,fontWeight:800,color:G,fontSize:14,margin:"0 0 14px"}}>🏷️ Hero Bölümü</h3><div style={{display:"grid",gap:12}}><div><label style={lbl}>Rozet Yazısı</label><input style={inp(false)} value={fm.badge} onChange={e=>f("badge",e.target.value)}/></div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}><div><label style={lbl}>Başlık 1</label><input style={inp(false)} value={fm.titleLine1} onChange={e=>f("titleLine1",e.target.value)}/></div><div><label style={lbl}>Başlık 2</label><input style={inp(false)} value={fm.titleLine2} onChange={e=>f("titleLine2",e.target.value)}/></div></div><div><label style={lbl}>Alt Yazı</label><textarea style={{...inp(false),minHeight:50,resize:"vertical"}} value={fm.subtitle} onChange={e=>f("subtitle",e.target.value)}/></div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}><div><label style={lbl}>Özellik 1</label><input style={inp(false)} value={fm.feat1} onChange={e=>f("feat1",e.target.value)}/></div><div><label style={lbl}>Özellik 2</label><input style={inp(false)} value={fm.feat2} onChange={e=>f("feat2",e.target.value)}/></div><div><label style={lbl}>Özellik 3</label><input style={inp(false)} value={fm.feat3} onChange={e=>f("feat3",e.target.value)}/></div></div></div></div>
<div style={crd}><h3 style={{fontFamily:ff,fontWeight:800,color:G,fontSize:14,margin:"0 0 14px"}}>🏦 IBAN / Ödeme Bilgileri</h3><div style={{display:"grid",gap:12}}><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}><div><label style={lbl}>Banka Adı</label><input style={inp(false)} value={fm.ibanBank} onChange={e=>f("ibanBank",e.target.value)}/></div><div><label style={lbl}>Hesap Sahibi</label><input style={inp(false)} value={fm.ibanHolder} onChange={e=>f("ibanHolder",e.target.value)}/></div></div><div><label style={lbl}>IBAN Numarası</label><input style={inp(false)} value={fm.ibanNumber} onChange={e=>f("ibanNumber",e.target.value)} placeholder="TR00 0000 0000 0000 0000 0000 00"/></div></div></div>
<div style={crd}><h3 style={{fontFamily:ff,fontWeight:800,color:G,fontSize:14,margin:"0 0 14px"}}>📞 Footer & İletişim</h3><div style={{display:"grid",gap:12}}><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}><div><label style={lbl}>Footer Başlık</label><input style={inp(false)} value={fm.footerTitle} onChange={e=>f("footerTitle",e.target.value)}/></div><div><label style={lbl}>Footer Alt Yazı</label><input style={inp(false)} value={fm.footerSubtitle} onChange={e=>f("footerSubtitle",e.target.value)}/></div></div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}><div><label style={lbl}>Telefon 1</label><input style={inp(false)} value={fm.phone1} onChange={e=>f("phone1",e.target.value)}/></div><div><label style={lbl}>Telefon 2</label><input style={inp(false)} value={fm.phone2} onChange={e=>f("phone2",e.target.value)}/></div><div><label style={lbl}>E-posta</label><input style={inp(false)} value={fm.email} onChange={e=>f("email",e.target.value)}/></div></div></div></div>
</div></div>)}

/* ═══ MAIN APP ═══ */
function App(){
  const[view,setView]=useState("public");
  const[showLogin,setShowLogin]=useState(false);
  const[ap,setAp]=useState("dash");
  const[events,setEvents]=useState(SE);
  const[regs,setRegs]=useState(SR);
  const[settings,setSettings]=useState(DEFAULT_SETTINGS);
  const[regEv,setRegEv]=useState(null);const[detEv,setDetEv]=useState(null);const[filter,setFilter]=useState("all");
  const[footerClicks,setFooterClicks]=useState(0);

  const pubEvs=events.filter(e=>e.status==="published");
  const filEvs=filter==="all"?pubEvs:pubEvs.filter(e=>e.type===filter);
  const S=settings;

  const handleFooterClick=()=>{
    const c=footerClicks+1;
    setFooterClicks(c);
    if(c>=5){setShowLogin(true);setFooterClicks(0)}
    setTimeout(()=>setFooterClicks(0),3000);
  };

  if(view==="public")return(
    <div style={{minHeight:"100vh",background:"#f4f7f2",fontFamily:ff}}>
      <div style={{background:`linear-gradient(160deg,#1b3a26 0%,${G} 40%,${GL} 100%)`,padding:"40px 20px 32px",textAlign:"center",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",inset:0,opacity:0.05,backgroundImage:`url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23fff'%3E%3Ccircle cx='30' cy='30' r='2'/%3E%3C/g%3E%3C/svg%3E")`}}/>
        <div style={{position:"relative",zIndex:1}}>
          <img src={LOGO} alt="Bir Çiçek Koleji" style={{width:64,height:64,borderRadius:"50%",border:"3px solid rgba(255,255,255,0.3)",display:"block",margin:"0 auto 12px",boxShadow:"0 4px 16px rgba(0,0,0,0.2)"}}/>
          <div style={{display:"inline-block",background:"rgba(255,255,255,0.15)",padding:"5px 16px",borderRadius:20,color:"#b9e4c9",fontSize:11,fontWeight:700,letterSpacing:2,marginBottom:14,textTransform:"uppercase"}}>{S.badge}</div>
          <h1 style={{fontFamily:ffT,color:"#fff",fontSize:"clamp(26px,5vw,40px)",margin:"0 0 8px",fontWeight:800,lineHeight:1.2}}>{S.titleLine1}<br/>{S.titleLine2}</h1>
          <p style={{color:"rgba(255,255,255,0.8)",fontSize:14,maxWidth:500,margin:"0 auto 16px",lineHeight:1.6}}>{S.subtitle}</p>
          <div style={{display:"flex",justifyContent:"center",gap:14,flexWrap:"wrap",fontSize:12,fontWeight:700,color:"rgba(255,255,255,0.7)"}}><span>{S.feat1}</span><span>{S.feat2}</span><span>{S.feat3}</span></div>
        </div>
      </div>
      <div style={{maxWidth:960,margin:"0 auto",padding:"20px 16px 0",display:"flex",gap:6,flexWrap:"wrap",justifyContent:"center"}}>{[{k:"all",l:"Tümü"},...Object.entries(TL).map(([k,v])=>({k,l:`${v.icon} ${v.label}`}))].map(f=>(<button key={f.k} onClick={()=>setFilter(f.k)} style={{padding:"7px 16px",background:filter===f.k?G:"#fff",color:filter===f.k?"#fff":"#555",border:filter===f.k?"none":"1px solid #ddd",borderRadius:18,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:ff}}>{f.l}</button>))}</div>
      <div style={{maxWidth:960,margin:"0 auto",padding:"20px 16px 40px",display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(270px,1fr))",gap:20}}>{filEvs.map(ev=><PubCard key={ev.id} ev={ev} regs={regs} onReg={setRegEv} onDet={setDetEv}/>)}{!filEvs.length&&<div style={{gridColumn:"1/-1",textAlign:"center",padding:40,color:"#999"}}>Bu kategoride etkinlik yok.</div>}</div>

      {/* FOOTER - Admin giriş gizli: logoya 5 kez tıkla */}
      <div style={{background:`linear-gradient(135deg,${G},#1a2e21)`,padding:"28px 20px",textAlign:"center"}}>
        <h2 style={{fontFamily:ffT,color:"#fff",margin:"0 0 6px",fontSize:20}}>{S.footerTitle}</h2>
        <p style={{color:"rgba(255,255,255,0.7)",fontSize:13,margin:"0 auto 12px",maxWidth:460}}>{S.footerSubtitle}</p>
        <div style={{display:"flex",justifyContent:"center",gap:14,flexWrap:"wrap",fontSize:12,color:"rgba(255,255,255,0.6)",marginBottom:16}}><span>{S.phone1}</span><span>{S.phone2}</span><span>{S.email}</span></div>
        <div style={{borderTop:"1px solid rgba(255,255,255,0.1)",paddingTop:12}}>
          <img src={LOGO} alt="" onClick={handleFooterClick} style={{width:28,height:28,borderRadius:"50%",opacity:0.3,cursor:"default",marginBottom:4,transition:"opacity 0.2s"}}/>
          <div style={{fontSize:10,color:"rgba(255,255,255,0.25)",fontFamily:ff}}>© 2026 Bir Çiçek Koleji Anaokulu</div>
        </div>
      </div>

      {regEv&&<RegModal event={regEv} onClose={()=>setRegEv(null)} onSubmit={r=>setRegs([...regs,r])} settings={settings}/>}
      {detEv&&<DetModal ev={detEv} regs={regs} onClose={()=>setDetEv(null)} onReg={setRegEv}/>}
      {showLogin&&<LoginModal onLogin={()=>{setShowLogin(false);setView("admin")}} onClose={()=>setShowLogin(false)}/>}
    </div>);

  return(<div style={{display:"flex",minHeight:"100vh",fontFamily:ff}}>
    <Sidebar active={ap} setActive={setAp} onOut={()=>setView("public")}/>
    <div style={{flex:1,background:"#f4f7f2",padding:"24px 28px",overflowY:"auto"}}>
      {ap==="dash"&&<Dash events={events} regs={regs}/>}
      {ap==="events"&&<EvMgr events={events} setEvents={setEvents}/>}
      {ap==="regs"&&<RegReport events={events} regs={regs}/>}
      {ap==="kids"&&<KidReport events={events} regs={regs}/>}
      {ap==="settings"&&<SettingsPage settings={settings} setSettings={setSettings}/>}
    </div>
  </div>)}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
